<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments :: head('Заметки')}"></head>

<body>

<nav th:replace="~{fragments :: navbar}"></nav>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Мои заметки</h1>
        <a th:href="@{/notes/new}" class="btn btn-success">+ Добавить заметку</a>
        <a th:href="@{/notes/import}" class="btn btn-outline-primary">Импортировать</a>
    </div>

    <!-- Поиск и фильтрация -->
    <div class="row mb-3">
        <!-- Поиск по заголовку -->
        <div class="col-md-6">
            <form th:action="@{/notes}" method="get">
                <div class="input-group">
                    <input type="text" name="search" class="form-control"
                           placeholder="Поиск по заголовку..."
                           th:value="${search}">
                    <button type="submit" class="btn btn-outline-primary">Найти</button>
                </div>
            </form>
        </div>

        <!-- Фильтр по типу -->
        <div class="col-md-4">
            <form th:action="@{/notes}" method="get">
                <div class="input-group">
                    <select name="type" class="form-select">
                        <option value="">Все типы</option>
                        <option th:each="t : ${types}"
                                th:value="${t.name()}"
                                th:text="${t.name()}"
                                th:selected="${t.name() == selectedType}">
                            ТИП
                        </option>
                    </select>
                    <button type="submit" class="btn btn-outline-secondary">Фильтр</button>
                </div>
            </form>
        </div>

        <!-- Сброс -->
        <div class="col-md-2">
            <a th:href="@{/notes}" class="btn btn-outline-dark w-100">Сбросить</a>
        </div>
    </div>

    <!-- Заметок в базе нет -->
    <div class="alert alert-info"
         th:if="${#lists.isEmpty(notesWithOutlines) and search == null and selectedType == null}">
        Заметок пока нет. Добавьте первую!
    </div>

    <!-- Поиск не дал результатов -->
    <div class="alert alert-warning"
         th:if="${#lists.isEmpty(notesWithOutlines) and (search != null or selectedType != null)}">
        По запросу ничего не найдено.
    </div>

    <!-- Таблица, если заметки есть -->
    <table class="table table-striped table-hover" th:unless="${#lists.isEmpty(notesWithOutlines)}">
        <thead class="table-dark">
        <tr>
            <th>№</th>
            <th>Название</th>
            <th>Тип</th>
            <th>Дата создания</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item, status : ${notesWithOutlines}">
            <td th:text="${status.count}">1</td>
            <td>
                <a th:href="@{/notes/{id}(id=${item.note.id})}"
                   th:text="${item.note.title}">Название</a>
                <button th:if="${!#lists.isEmpty(item.headings)}"
                        class="btn btn-sm btn-link p-0 ms-2"
                        style="transition: transform 0.2s;"
                        onclick="
            this.closest('td').querySelector('.note-outline').classList.toggle('d-none');
            this.style.transform = this.style.transform === 'rotate(180deg)' ? '' : 'rotate(180deg)';
        ">▼</button>
                <!-- Оглавление -->
                <ul th:unless="${#lists.isEmpty(item.headings)}"
                    class="list-unstyled mb-0 mt-1 note-outline d-none" style="font-size: 0.85em;">
                    <li th:each="h : ${item.headings}"
                        th:class="${h.level == 3 ? 'ms-3 text-muted' : 'text-muted'}">
                        <span th:text="${h.text}">Заголовок</span>
                    </li>
                </ul>
            </td>
            <td>
                <span class="badge bg-secondary" th:text="${item.note.type}">ТИП</span>
            </td>
            <td th:text="${item.note.createdAt}">2026-01-01</td>
            <td>
                <a th:href="@{/notes/{id}/edit(id=${item.note.id})}"
                   class="btn btn-sm btn-outline-primary">
                    Редактировать
                </a>
                <form th:action="@{/notes/{id}/delete(id=${item.note.id})}" method="post"
                      style="display:inline;">
                    <button type="submit" class="btn btn-sm btn-outline-danger"
                            onclick="return confirm('Удалить эту заметку?')">
                        Удалить
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

</div>

<footer th:replace="~{fragments :: footer}"></footer>

</body>
</html>
