<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments :: head(${note.title})}"></head>

<body>

<nav th:replace="~{fragments :: navbar}"></nav>

<div class="container mt-4">
    <style>
        .note-content table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1rem;
        }

        .note-content th,
        .note-content td {
            border: 1px solid #dee2e6;
            padding: 8px 12px;
            text-align: left;
        }

        .note-content th {
            background-color: #f8f9fa;
            font-weight: bold;
        }

        .note-content tr:nth-child(even) {
            background-color: #f8f9fa;
        }
    </style>

    <h1 th:text="${note.title}">Название заметки</h1>

    <div class="mb-4 text-muted">
        <span class="badge bg-secondary me-2" th:text="${note.type}">ТИП</span>
        Создано: <span th:text="${#temporals.format(note.createdAt, 'dd.MM.yyyy HH:mm')}">01.01.2026</span>
        | Обновлено: <span th:text="${#temporals.format(note.updatedAt, 'dd.MM.yyyy HH:mm')}">01.01.2026</span>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="card-body note-content" th:utext="${contentHtml}">Содержимое заметки</div>
        </div>
    </div>

    <div class="mt-3">
        <a th:href="@{/notes/{id}/edit(id=${note.id})}" class="btn btn-outline-primary">Редактировать</a>
        <a th:href="@{/notes}" class="btn btn-outline-secondary">← К списку</a>
    </div>

</div>

<footer th:replace="~{fragments :: footer}"></footer>

<!-- Подсветка кода -->
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>hljs.highlightAll();</script>

</body>
</html>
