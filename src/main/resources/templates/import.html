<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Импорт — StudyNotes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1>Импорт заметок</h1>
    <p class="text-muted">Укажите путь к папке с .md файлами из Obsidian</p>

    <form th:action="@{/notes/import}" method="post" class="mb-4">
        <div class="mb-3">
            <label for="folderPath" class="form-label">Путь к папке</label>
            <input type="text" class="form-control" id="folderPath"
                   name="folderPath"
                   placeholder="/home/dobrynya/obsidian/notes"
                   required>
        </div>
        <button type="submit" class="btn btn-primary">Импортировать</button>
    </form>

    <!-- Результат импорта -->
    <div th:if="${result}">

        <!-- Ошибки -->
        <div th:if="${!result.errors.isEmpty()}" class="alert alert-danger">
            <strong>Ошибки:</strong>
            <ul class="mb-0">
                <li th:each="error : ${result.errors}" th:text="${error}">Ошибка</li>
            </ul>
        </div>

        <!-- Успешный результат -->
        <div th:if="${result.imported > 0 || result.skipped > 0}" class="alert alert-success">
            <p class="mb-1">Всего файлов: <strong th:text="${result.total}">0</strong></p>
            <p class="mb-1">Импортировано: <strong th:text="${result.imported}">0</strong></p>
            <p class="mb-0">Пропущено (дубликаты): <strong th:text="${result.skipped}">0</strong></p>
        </div>

    </div>

    <a th:href="@{/notes}" class="btn btn-outline-secondary">← К заметкам</a>

</div>

</body>
</html>
